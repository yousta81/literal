<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dosłownik</title>
    <link rel="stylesheet" href="static/style.css">
   
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Dosłownik to gra słowna, w której gracze muszą odgadnąć oryginalne słowo lub frazę na podstawie dosłownego opisu. Gra rozwija kreatywność i umiejętność kojarzenia, a także jest świetną zabawą dla osób w każdym wieku.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="static/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">


  
</head>
<body>
<script>
let data = [];
let current = 0;
let showAnswer = false;

let timeLeft = 10;
let timerInterval = null;
let timeUp = false;

const rootStyles = getComputedStyle(document.documentElement);
const negativeColor = rootStyles.getPropertyValue('--negative-color');

// wczytanie JSON
window.onload = () => {
  fetch('literal.json')
    .then(res => res.json())
    .then(json => {
      data = json;
      loadQuestion();
    })
    .catch(err => {
      console.error("Błąd wczytywania JSON:", err);
    });
};

// ⏱️ TIMER
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 10;
  timeUp = false;

  const timerEl = document.getElementById("question-timer");


  function updateTimer() {
    if (!timerEl) return;

    timerEl.textContent = timeLeft + "s";

    if (timeLeft <= 3) {
  timerEl.style.color = negativeColor;
} else {
  timerEl.style.color = "";
}
  }

  updateTimer();

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer();

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timeUp = true;

      // 👉 ZAMIANA NA "Sprawdź odpowiedź"
      showCheckAnswerScreen();
    }
  }, 1000);
}

// 🟡 ekran po czasie
function showCheckAnswerScreen() {
  document.getElementById('literal').innerHTML = `
    <h1 class="ibm-plex-mono-medium reveal-text">
      ⏳ Czas minął
    </h1>
    <p class="reveal-text-delayed ibm-plex-mono-medium">
      Sprawdź odpowiedź
    </p>
  `;

  document.querySelector('footer').innerHTML = `
    <div class="round-btn" id="question-timer"></div>
    <div id="question-counter">Pytanie ${current + 1} / ${data.length}</div>
    <div class="round-btn" onclick="showSolution()">Odpowiedź</div>
  `;

  // pokazujemy timer (zamrożony lub restart opcjonalny)
  document.getElementById("question-timer").textContent = "0s";
}

// 📌 pytanie
function loadQuestion() {
  showAnswer = false;

  const item = data[current];

  document.getElementById('literal').innerHTML = `
    <h1 class="ibm-plex-mono-medium reveal-text">
      ${item.literal} <span class="emoji">${String.fromCodePoint(item["emoji-dec"])}</span>
    </h1>
  `;

  document.querySelector('footer').innerHTML = `
    <div class="round-btn" id="question-timer"></div>
    <div id="question-counter">Pytanie ${current + 1} / ${data.length}</div>
    <div class="round-btn" onclick="showSolution()">Odpowiedź</div>
  `;

  startTimer();
}

// 📖 pokazanie odpowiedzi
function showSolution() {
  clearInterval(timerInterval);

  const item = data[current];

  document.getElementById('literal').innerHTML = `
    <h1 class="ibm-plex-mono-medium reveal-text">
      ${item.original}
    </h1>
    <p id="explanation" class="reveal-text-delayed ibm-plex-mono-medium">
      ${item.explanation_en}
    </p>
  `;

  document.querySelector('footer').innerHTML = `
    <div class="round-btn negative" onclick="nextQuestion()">Źle</div>
    <div id="question-counter">Pytanie ${current + 1} / ${data.length}</div>
    <div class="round-btn positive" onclick="nextQuestion()">Dobrze</div>
  `;
}

// ➡️ następne pytanie
function nextQuestion() {
  clearInterval(timerInterval);

  current++;

  if (current >= data.length) {
    current = 0;
  }

  loadQuestion();
}
</script>
<div class="container quicksand-600">
  <header class="header"><div id="logo"><img src="static/logo.png" alt="Logo"></div><div class="title">Dosłownik</div></header>
  <main class="content content-en" id="literal">
    <h1 class="ibm-plex-mono-medium  reveal-text"><span class="emoji"></span></h1>
  
  </main>
  <footer class="footer"><div class="round-btn" id="question-timer"></div><div id="question-counter">Pytanie 7 / 10</div><div class="round-btn" onclick="showSolution()">Odpowiedź</div></footer>
</div>

       
        
</body>
</html>
